apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gamems
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/giovannicataudo/gamems.git'
    targetRevision: main
    path: k8s/phase3_cloud
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gamems
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
