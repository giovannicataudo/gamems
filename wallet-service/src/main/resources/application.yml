# ========================================================
# CONFIGURAZIONE WALLET SERVICE
# File centrale di configurazione. Ottimizzato per 
# l'esecuzione in container Docker con risorse limitate.
# ========================================================

server:
  # Assegniamo la porta 8082
  port: 8082

spring:
  application:
    name: wallet-service

  # --- OTTIMIZZAZIONE MEMORIA E CONCORRENZA ---
  threads:
    virtual:
      # CRITICO: Abilita i Virtual Threads di Java 25.
      # Permette di gestire migliaia di richieste abbattendo il consumo di RAM.
      enabled: true

  # --- CONFIGURAZIONE DATABASE POSTGRESQL ---
  datasource:
    # Usa il DNS di Docker 'postgres-db'. Fallback su localhost se avviato fuori da Docker.
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/wallet_db
    username: ${DB_USER:wallet_user}
    password: ${DB_PASS:wallet_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Limitiamo il pool di connessioni per risparmiare memoria (max 10 connessioni attive)
      maximum-pool-size: 10

  # --- CONFIGURAZIONE HIBERNATE/JPA ---
  jpa:
    # Aggiorna lo schema automaticamente (utile in locale/didattica)
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # --- CONFIGURAZIONE RABBITMQ ---
  rabbitmq:
    # Usa il DNS di Docker 'rabbitmq-broker'
    host: ${RABBIT_HOST:localhost}
    port: 5672
    virtual-host: gamems_vhost
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
    listener:
      simple:
      # Riproverà a pubblicare l'evento su Rabbit
        retry:
          enabled: true
          initial-interval: 2000ms
          multiplier: 2.0
          max-retries: 5
          max-interval: 30000ms

# Configurazione Sicurezza e JWT
app:
  jwt:
    # Segreta usata per firmare i token. In produzione va caricata da Vault o ENV.
    secret: "LaTuaChiaveSegretaMoltoLungaPerGarantireLaSicurezzaDelSistema2026!"
  internal: # Api-Key interna per accesso alle rotte /internal
    secret: "LaTuaChiaveSegretaInternaMoltoLungaPerComunicazioniTraMicroservizi2026!"

# --- CONFIGURAZIONE ACTUATOR (HEALTH CHECKS) ---
management:
  endpoints:
    web:
      exposure:
        # Esponiamo solo l'health check per Docker. Nascondiamo il resto per sicurezza.
        include: health, metrics
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:never}