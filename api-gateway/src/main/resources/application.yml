server:
  port: 8080

spring:
  application:
    name: api-gateway
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: 5672
    virtual-host: gamems_vhost
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      # Timeout di connessione (se non trova Redis entro 2 sec, va in errore)
      timeout: 2000
      lettuce:
        pool:
          max-active: 10 # Connessioni massime contemporanee al db Redis
          max-idle: 5
# Configurazione della Sicurezza
app:
  cors:
    # Questa variabile verrà sovrascritta da K8s tramite ConfigMap
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8080}
  user-service:
    url: http://${USER_HOST:localhost}:8081
  game-service:
    url: http://${GAME_HOST:localhost}:8083
  wallet-service:
    url: http://${WALLET_HOST:localhost}:8082
  api-key: ${APP_API_KEY}
  jwt:
    secret: ${APP_JWT_SECRET}
  internal:
    secret: ${APP_INTERNAL_SECRET}
  rate-limit:
    anonymous:
      requests: 20    # Tentativi massimi (IP)
      duration-sec: 60 # Finestra temporale (1 minuto)
    authenticated:
      requests: 50    # Richieste massime (JWT)
      duration-sec: 60
      
# Monitoraggio
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      # Mostra i dettagli (DB status, Disk) solo se configurato esplicitamente
      show-details: ${HEALTH_SHOW_DETAILS:never}