# ========================================================
# CONFIGURAZIONE GAME SERVICE
# ========================================================

server:
  port: 8083

spring:
  application:
    name: game-service

  # --- OTTIMIZZAZIONE MEMORIA E CONCORRENZA ---
  threads:
    virtual:
      # Fondamentale per mantenere il microservizio leggerissimo (8GB RAM host)
      enabled: true

  # --- CONFIGURAZIONE DATABASE POSTGRESQL ---
  datasource:
    # Si connette allo stesso container Postgres, ma usa un database logico isolato
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/game_db
    username: ${DB_USER:game_user}
    password: ${DB_PASS:game_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  # --- CONFIGURAZIONE HIBERNATE/JPA ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # --- CONFIGURAZIONE RABBITMQ ---
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: 5672
    virtual-host: gamems_vhost
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
    template:
      retry:
      # Riproverà a pubblicare l'evento su Rabbit qualche volta
        enabled: true
        initial-interval: 1000ms
        multiplier: 2.0
        max-retries: 3
        max-interval: 10000ms

# --- CONFIGURAZIONE ACTUATOR (HEALTH CHECKS) ---
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# ========================================================
# VARIABILI CUSTOM (Dominio)
# ========================================================
# URL del Wallet Service (usato dal WebClient interno per chiamate sincrone)
# In Docker userà http://wallet-service:8082, in locale http://localhost:8082
app:
  wallet-service:
    url: http://${WALLET_HOST:localhost}:8082
  jwt: # Segreta usata per firmare i token.
    secret: "LaTuaChiaveSegretaMoltoLungaPerGarantireLaSicurezzaDelSistema2026!"
  internal: # Api-Key interna per accesso alle rotte /internal
    secret: "LaTuaChiaveSegretaInternaMoltoLungaPerComunicazioniTraMicroservizi2026!"