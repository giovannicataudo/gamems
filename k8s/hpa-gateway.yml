# ==========================================
# HORIZONTAL POD AUTOSCALER (HPA)
# Target: API Gateway Deployment
# ==========================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:

  annotations:

    argocd.argoproj.io/sync-wave: "2"
  name: gateway-hpa
  namespace: gamems
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway-deployment
  minReplicas: 1
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
