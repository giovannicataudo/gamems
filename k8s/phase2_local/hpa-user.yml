# ==========================================
# HORIZONTAL POD AUTOSCALER (HPA)
# Target: User Deployment
# ==========================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:

  annotations:

    argocd.argoproj.io/sync-wave: "2"
  name: user-hpa
  namespace: gamems
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-deployment
  minReplicas: 1
  maxReplicas: 3
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120 # Ignora i picchi CPU durante l'avvio di Java
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
