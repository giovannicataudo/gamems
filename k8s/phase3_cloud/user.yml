# ==========================================
# USER SERVICE (Porta 8081)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:

  annotations:

    argocd.argoproj.io/sync-wave: "2"
  name: user-deployment
  namespace: gamems
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: ghcr.io/giovannicataudo/gamems-user-service:6087bb4
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        env:
        - name: JAVA_TOOL_OPTIONS
          value: "-Xms128m -Xmx256m"
        - name: HEALTH_SHOW_DETAILS
          valueFrom: { configMapKeyRef: { name: gamems-config, key: HEALTH_SHOW_DETAILS } }
        - name: DB_HOST
          valueFrom: { configMapKeyRef: { name: gamems-config, key: DB_HOST } }
        - name: DB_USER
          valueFrom: { configMapKeyRef: { name: gamems-config, key: USER_DB_USER } }
        - name: DB_PASS
          valueFrom: { secretKeyRef: { name: gamems-secrets, key: USER_DB_PASS } }
        - name: RABBIT_HOST
          valueFrom: { configMapKeyRef: { name: gamems-config, key: RABBIT_HOST } }
        - name: RABBIT_USER
          valueFrom: { configMapKeyRef: { name: gamems-config, key: RABBIT_USER } }
        - name: RABBIT_PASS
          valueFrom: { secretKeyRef: { name: gamems-secrets, key: RABBIT_PASS } }
        - name: APP_JWT_SECRET
          valueFrom: { secretKeyRef: { name: gamems-secrets, key: APP_JWT_SECRET } }
        - name: APP_INTERNAL_SECRET
          valueFrom: { secretKeyRef: { name: gamems-secrets, key: APP_INTERNAL_SECRET } }
        - name: MAIL_HOST
          valueFrom: { configMapKeyRef: { name: gamems-config, key: MAIL_HOST } }
        resources:
          requests: { memory: "256Mi", cpu: "100m" }
          limits: { memory: "512Mi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:

  annotations:

    argocd.argoproj.io/sync-wave: "2"
  name: user-service
  namespace: gamems
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081