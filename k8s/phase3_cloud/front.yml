apiVersion: apps/v1
kind: Deployment
metadata:

  annotations:

    argocd.argoproj.io/sync-wave: "4"
  name: frontend-deployment
  namespace: gamems
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        gitops.version: "v2"
    spec:
      imagePullSecrets:
      - name: gamems-registry-secret
      containers:
      - name: frontend
        image: ghcr.io/giovannicataudo/gamems-frontend-app:latest 
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:

  annotations:

    argocd.argoproj.io/sync-wave: "4"
  name: frontend-service
  namespace: gamems
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80