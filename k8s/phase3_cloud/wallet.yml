# ==========================================
# WALLET SERVICE (Porta 8082)
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:

  annotations:

    argocd.argoproj.io/sync-wave: "2"
  name: wallet-deployment
  namespace: gamems
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallet-service
  template:
    metadata:
      labels:
        app: wallet-service
    spec:
      imagePullSecrets:
      - name: gamems-registry-secret
      containers:
      - name: wallet-service
        image: ghcr.io/giovannicataudo/gamems-wallet-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
        env:
        - name: JAVA_TOOL_OPTIONS
          value: "-Xms128m -Xmx256m"
        - name: HEALTH_SHOW_DETAILS
          valueFrom: { configMapKeyRef: { name: gamems-config, key: HEALTH_SHOW_DETAILS } }
        - name: DB_HOST
          valueFrom: { configMapKeyRef: { name: gamems-config, key: DB_HOST } }
        - name: DB_USER
          valueFrom: { configMapKeyRef: { name: gamems-config, key: WALLET_DB_USER } }
        - name: DB_PASS
          valueFrom: { secretKeyRef: { name: gamems-secrets, key: WALLET_DB_PASS } }
        - name: RABBIT_HOST
          valueFrom: { configMapKeyRef: { name: gamems-config, key: RABBIT_HOST } }
        - name: RABBIT_USER
          valueFrom: { configMapKeyRef: { name: gamems-config, key: RABBIT_USER } }
        - name: RABBIT_PASS
          valueFrom: { secretKeyRef: { name: gamems-secrets, key: RABBIT_PASS } }
        - name: APP_JWT_SECRET
          valueFrom: { secretKeyRef: { name: gamems-secrets, key: APP_JWT_SECRET } }
        - name: APP_INTERNAL_SECRET
          valueFrom: { secretKeyRef: { name: gamems-secrets, key: APP_INTERNAL_SECRET } }
        resources:
          requests: { memory: "256Mi", cpu: "100m" }
          limits: { memory: "512Mi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:

  annotations:

    argocd.argoproj.io/sync-wave: "2"
  name: wallet-service
  namespace: gamems
spec:
  selector:
    app: wallet-service
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082