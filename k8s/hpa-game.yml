# ==========================================
# HORIZONTAL POD AUTOSCALER (HPA)
# Target: Game Deployment (CPU Bound)
# ==========================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: game-hpa
  namespace: gamems
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: game-deployment
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        #Messo così basso per apprezza più facilmente lo scaling
        averageUtilization: 5