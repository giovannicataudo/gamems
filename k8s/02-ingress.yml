# =============================
# INGRESS
# =============================
# Sfruttiamo Traefik, un controller ingress integrato
# Questo ingress drirotta ogni chiamata a gamems.local
#  alla porta 80 del frontend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gamems-ingress
  namespace: gamems
  annotations:
    # Abilita l'http
    ingress.kubernetes.io/ssl-redirect: "false" 
spec:
  rules:
  - host: gamems.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80