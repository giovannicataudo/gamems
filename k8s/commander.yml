# ==========================================
# REDIS COMMANDER (Gestione Web per Redis)
# ==========================================
# Si connette automaticamente grazie ala variabile d'ambiente
# localhost:32081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-commander-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-commander
  template:
    metadata:
      labels:
        app: redis-commander
    spec:
      containers:
      - name: redis-commander
        image: rediscommander/redis-commander:latest
        env:
        - name: REDIS_HOSTS
          value: "GamemsRedis:redis-service:6379"
        ports:
        - containerPort: 8081
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-commander-service
spec:
  type: NodePort
  selector:
    app: redis-commander
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
      nodePort: 32081