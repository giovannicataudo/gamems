name: CI/CD Pipeline to GHCR & GitOps

on:
  push:
    branches:
      - main
    paths:
      - 'user-service/**'
      - 'wallet-service/**'
      - 'game-service/**'
      - 'api-gateway/**'
      - 'frontend-app/**'
      - '.github/workflows/ci-cd.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Serve per pushare i commit sui file k8s/
      packages: write # Serve per caricare immagini su GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # BUILD & PUSH USER SERVICE
      - name: Build and push User Service
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-user-service:${{ env.SHORT_SHA }} ./user-service
          docker push ${{ env.IMAGE_PREFIX }}-user-service:${{ env.SHORT_SHA }}
          sed -i "s|image: .*gamems-user-service.*|image: ${{ env.IMAGE_PREFIX }}-user-service:${{ env.SHORT_SHA }}|g" k8s/phase3_cloud/user.yml

      # BUILD & PUSH WALLET SERVICE
      - name: Build and push Wallet Service
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-wallet-service:${{ env.SHORT_SHA }} ./wallet-service
          docker push ${{ env.IMAGE_PREFIX }}-wallet-service:${{ env.SHORT_SHA }}
          sed -i "s|image: .*gamems-wallet-service.*|image: ${{ env.IMAGE_PREFIX }}-wallet-service:${{ env.SHORT_SHA }}|g" k8s/phase3_cloud/wallet.yml

      # BUILD & PUSH GAME SERVICE
      - name: Build and push Game Service
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-game-service:${{ env.SHORT_SHA }} ./game-service
          docker push ${{ env.IMAGE_PREFIX }}-game-service:${{ env.SHORT_SHA }}
          sed -i "s|image: .*gamems-game-service.*|image: ${{ env.IMAGE_PREFIX }}-game-service:${{ env.SHORT_SHA }}|g" k8s/phase3_cloud/game.yml

      # BUILD & PUSH API GATEWAY
      - name: Build and push API Gateway
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-api-gateway:${{ env.SHORT_SHA }} ./api-gateway
          docker push ${{ env.IMAGE_PREFIX }}-api-gateway:${{ env.SHORT_SHA }}
          sed -i "s|image: .*gamems-api-gateway.*|image: ${{ env.IMAGE_PREFIX }}-api-gateway:${{ env.SHORT_SHA }}|g" k8s/phase3_cloud/gateway.yml

      # BUILD & PUSH FRONTEND APP
      - name: Build and push Frontend App
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-frontend-app:${{ env.SHORT_SHA }} ./frontend-app
          docker push ${{ env.IMAGE_PREFIX }}-frontend-app:${{ env.SHORT_SHA }}
          sed -i "s|image: .*gamems-frontend-app.*|image: ${{ env.IMAGE_PREFIX }}-frontend-app:${{ env.SHORT_SHA }}|g" k8s/phase3_cloud/front.yml

      # COMMIT UPDATED YAML FILES
      - name: Commit and Push k8s manifest updates
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add k8s/phase3_cloud/*.yml
          # Se ci sono modifiche, committiamo e pushiamo
          if ! git diff-index --quiet HEAD; then
            git commit -m "ci: deploy images from commit ${{ env.SHORT_SHA }} [skip ci]"
            git push
          else
            echo "Nessuna modifica ai manifesti."
          fi
